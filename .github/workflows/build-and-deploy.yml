name: Build and Deploy Frontend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ec2-ecr
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: |
          REPO_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/paper-thesis/trade-engine
          IMAGE_TAG=${{ github.sha }}
          IMAGE_LATEST_TAG="latest"
          docker build -t $REPO_URI:$IMAGE_TAG -t $REPO_URI:$IMAGE_LATEST_TAG .
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Push Docker image to Amazon ECR
        run: |
          REPO_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/paper-thesis/trade-engine
          IMAGE_TAG=${{ github.sha }}
          IMAGE_LATEST_TAG="latest"
          docker push $REPO_URI:$IMAGE_TAG
          docker push $REPO_URI:$IMAGE_LATEST_TAG
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}

